services:
  - type: web
    name: pneumonia-detection-system
    env: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MODEL_PATH
        value: models/pneumonia_model.h5
      - key: FLASK_ENV
        value: production